<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
       <div class="brand">
        <img src="logo.jpg" alt="logo" class="logo">
       <span class="slogan">"Sweet Treats For Every occasion"</span>
       </div>
        <nav class="main-nav">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="products.html">Our Products</a>
            <a href="contacts.html">Contacts</a>
            <a href="feedback.html">Feedback</a>
        </nav>
    </header>
    
    <section id="feedback" class="feedback-section">
        <div class="feedback-header">
            <h1 class="section-title">We love hearing from you!</h1>
        </div>

        <form class="feedback-form">
            <div class="form-container">
                
                <div class="form-left">
                    <div class="input-group">
                        <label>Name (Optional):</label>
                        <input type="text" placeholder="Enter your name">
                        <div class="radio-group">
                            <label class="radio-container">
                                <input type="radio" name="display_name" value="show" checked>
                                <span class="checkmark"></span> Show my name
                            </label>
                            <label class="radio-container">
                                <input type="radio" name="display_name" value="anonymous">
                                <span class="checkmark"></span> Anonymous
                            </label>
                        </div>
                    </div>
                </div>
                    
                    <div class="input-group">
                        <label>Comment:</label>
                        <textarea rows="4" placeholder="Your overall thoughts..."></textarea>
                    </div>

                    <div class="input-group">
                        <label>What did you love?</label>
                        <input type="text" placeholder="e.g.The brownies...">
                    </div>

                    <div class="input-group">
                        <label>What can we make better?</label>
                        <input type="text" placeholder="Your suggestions...">
                    </div>
                </div>
            </div>

            <div class="submit-container">
                <button type="submit" class="btn-gold submit-btn">Submit</button>
            </div>
        </form>
    </section>

    <footer>
       <p>&copy;2026 The sweet stop</p>
    </footer>
    <div id="successPopup" class="popup-message hidden">
    <div class="popup-content">
        <i class="fas fa-check-circle"></i>
        <h2>Thank You For Your Feedback!</h2>
        <p>You've just made <strong>The Sweet Stop</strong> even better.</p>
        <button onclick="closePopup()" class="btn-outline">Close</button>
    </div>
</div>
    <script src="script.js"></script>
    </body>
    </html>
