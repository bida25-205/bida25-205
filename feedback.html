<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
       <div class="brand">
        <img src="logo.jpg" alt="logo" class="logo">
       <span class="slogan">"Sweet Treats For Every occasion"</span>
       </div>
        <nav class="main-nav">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="products.html">Our Products</a>
            <a href="contacts.html">Contacts</a>
            <a href="feedback.html">Feedback</a>
        </nav>
    </header>
    
    <section id="feedback" class="feedback-section">
        <div class="feedback-header">
            <p class="tagline">— Your experience</p>
            <h2 class="section-title">" We love hearing from you! "</h2>
        </div>

        <form class="feedback-form">
            <div class="form-container">
                
                <div class="form-left">
                    <div class="input-group">
                        <label>Name (Optional):</label>
                        <input type="text" placeholder="Enter your name">
                        <div class="radio-group">
                            <label class="radio-container">
                                <input type="radio" name="display_name" value="show" checked>
                                <span class="checkmark"></span> Show my name
                            </label>
                            <label class="radio-container">
                                <input type="radio" name="display_name" value="anonymous">
                                <span class="checkmark"></span> Anonymous
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-right">
                    <div class="input-group rating-group">
                        <label>Rating:</label>
                        <div class="star-rating">
                            <i class="far fa-star" data-rating="1"></i>
                            <i class="far fa-star" data-rating="2"></i>
                            <i class="far fa-star" data-rating="3"></i>
                            <i class="far fa-star" data-rating="4"></i>
                            <i class="far fa-star" data-rating="5"></i>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label>Comment:</label>
                        <textarea rows="4" placeholder="Your overall thoughts..."></textarea>
                    </div>

                    <div class="input-group">
                        <label>What did you love?</label>
                        <input type="text" placeholder="e.g., The vanilla muffins!">
                    </div>

                    <div class="input-group">
                        <label>What can we make better?</label>
                        <input type="text" placeholder="Your suggestions...">
                    </div>
                </div>
            </div>

            <div class="submit-container">
                <button type="submit" class="btn-gold submit-btn">Submit Feedback</button>
                <p class="ty-message">"Thank you" message will appear here after submit.</p>
            </div>
        </form>
    </section>

    <footer>
       <p>&copy;2026 The sweet stop</p>
    </footer>

    <script>
        const stars = document.querySelectorAll('.star-rating i');
        stars.forEach((star, index) => {
            star.addEventListener('click', () => {
                stars.forEach(s => s.classList.replace('fas', 'far')); 
                for (let i = 0; i <= index; i++) {
                    stars[i].classList.replace('far', 'fas'); 
                }
            });
        });
    </script>
