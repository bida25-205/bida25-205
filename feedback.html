<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
       <div class="brand">
        <img src="logo.jpg" alt="logo" class="logo">
       <span class="slogan">"Sweet Treats For Every occasion"</span>
       </div>
        <nav class="main-nav">
            <div class="nav-links" id="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="products.html">Our Products</a>
            <a href="contacts.html">Contacts</a>
            <a href="feedback.html">Feedback</a>
            </div>
    <button class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </button>    
        </nav>
    </header>
    
    <section id="feedback" class="feedback-section">
        <div class="feedback-header">
            <h1 class="section-title">We love hearing from you!</h1>
        </div>

            <form id="feedbackForm" action="https://formspree.io/f/mgorykpa" method="POST">
            <div class="form-container">
                
        
                    <div class="input-group">
                        <label>Name (Optional):</label>
                        <input type="text" name="name" placeholder="Enter your name">
                        <div class="radio-group">
                            <label class="radio-container">
                                <input type="radio" name="display_name" value="show">
                                <span class="checkmark"></span> Show my name
                            </label>
                            <label class="radio-container">
                                <input type="radio" name="display_name" value="anonymous">
                                <span class="checkmark"></span> Anonymous
                            </label>
                        </div>
                    </div>
                </div>
                    
                    <div class="input-group">
                        <label>Comment:</label>
                        <textarea name="Comment" placeholder="Your overall thoughts..."></textarea>
                    </div>

                    <div class="input-group">
                        <label>What did you love?</label>
                        <input type="text" name="loved" placeholder="e.g.The brownies...">
                    </div>

                    <div class="input-group">
                        <label>What can we make better?</label>
                        <input type="text" name="improve" placeholder="Your suggestions...">
                    </div>
                </div>
            </div>

            <div class="submit-container">
                <button type="submit" class="btn-gold submit-btn">Submit</button>
            </div>
        </form>
    </section>

    <footer class="site-footer">
  <p class="footer-brand">The Sweet Stop 🍰</p>
  <p class="footer-tagline">Sweet treats for every occasion</p>
  <p class="footer-copy">© 2026 The Sweet Stop. All rights reserved.</p>
</footer>

    <div id="thankYouPopup" class="popup">
    <div class="popup-content">
        <h2>Thank You For Your Feedback!</h2>
        <button id="closePopup">Close</button>
    </div>
</div>
    <script src="script.js"></script>
    </body>
    </html>
